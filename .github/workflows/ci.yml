name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: tests (Ubuntu · Python 3.11 · R + deepgp)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.3"
          use-public-rspm: true   # precompiled CRAN binaries (no source compilation)

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-rlibs-deepgp-v1
          restore-keys: ${{ runner.os }}-rlibs-

      - name: Install deepgp
        run: |
          Rscript -e 'if (!requireNamespace("deepgp", quietly = TRUE)) install.packages("deepgp")'
          Rscript -e 'cat("deepgp", as.character(packageVersion("deepgp")), "\n")'

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[ui,dev]"

      # No RS2 license on CI: the demo solver serves real precomputed RS2 results,
      # so the deepgp end-to-end test runs in full. GEOSURROGATE_RSCRIPT points the
      # config at the runner's R instead of the author's Windows path.
      - name: Run test suite (incl. deepgp end-to-end)
        env:
          GEOSURROGATE_RSCRIPT: Rscript
        run: pytest -q

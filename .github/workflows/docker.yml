name: Docker image

# Builds the demo dashboard image and publishes it to GitHub Container Registry
# (ghcr.io/<owner>/geosurrogate). Runs only when something that affects the
# image changes, plus on-demand — the deepgp compile makes a build a few minutes,
# so we don't rebuild on every unrelated push.
on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "src/**"
      - "app/**"
      - "demo_cases/**"
      - "pyproject.toml"
      - ".github/workflows/docker.yml"
  workflow_dispatch:

jobs:
  build-and-push:
    name: build & push demo image to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to push to GHCR with the built-in GITHUB_TOKEN

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache the layers (incl. the slow deepgp compile) between runs.
          cache-from: type=gha
          cache-to: type=gha,mode=max

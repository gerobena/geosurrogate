# Demo case: embankment with 3 selected variables (3D) - the dogfooding case.
# The dataset was generated BY geosurrogate itself (run runs/embankment_3d,
# converged at 29 simulations on 11-06-2026) over the Rocscience Embankment
# tutorial model, plus an independent LHS testset batch for the pool.
# phi of 'sand' is fixed at the model base value (35 deg = distribution mean).
project:
  name: "Demo - Embankment, 3 variables (3D, dogfooding)"
  schema_version: 1
solver:
  type: demo
  demo_case: embankment_3d
  simulate_delay_s: 0.0
variables:
  - id: coh_m1
    material: "embankment"
    property: cohesion
    training_bounds: [90.0, 102.0]
    distribution: {family: normal, mean: 100.0, std: 5.0, truncate: [90.0, 102.0]}
  - id: phi_m1
    material: "embankment"
    property: friction_angle
    training_bounds: [21.0, 28.0]
    distribution: {family: normal, mean: 25.0, std: 3.0, truncate: [21.0, 28.0]}
  - id: coh_m2
    material: "sand"
    property: cohesion
    training_bounds: [0.0, 2.0]
    distribution: {family: normal, mean: 0.0, std: 1.0, truncate: [0.0, 2.0]}
doe:
  strategy: factorial_3    # 3^3 = 27 points, as in the real run
  seed: 42
active_learning:
  acquisition: alc
  tolerance: 0.01
  max_iterations: 40
  budget_total_sims: 60
  n_candidates: 500
  refresh_candidates: true
  validation_grid: {n: 2000, seed: 999}
  seed: 123
surrogate:
  engine: deepgp_r
  mcmc: {nmcmc: 3000, burn: 1000, thin: 2}
  kernel: exp2
  separable: true
  seed: 123
exploitation:
  mcs_samples: 100000
  failure_threshold: 1.3
  seed: 7
